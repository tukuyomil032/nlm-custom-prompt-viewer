name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI pipeline
        run: bun run ci

      - name: Run lint
        run: bun run lint

      - name: Block prerelease publishing
        if: ${{ github.event.release.prerelease }}
        run: |
          echo "Prerelease releases are not published by this workflow."
          exit 1

      - name: Validate release tag vs package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG="${RELEASE_TAG#v}"
          PKG_VERSION="$(bun -e "const p = JSON.parse(await Bun.file('package.json').text()); console.log(p.version)")"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Package version: ${PKG_VERSION}"
          if [ "${TAG}" != "${PKG_VERSION}" ]; then
            echo "Tag/version mismatch: ${RELEASE_TAG} vs ${PKG_VERSION}"
            exit 1
          fi

  publish:
    needs:
      - verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npm Trusted Publishing
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish package
        run: npm publish
